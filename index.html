<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Horario · v5.1.0</title>
</head>
<body>
  <div class="container">
    <h2 class="sr-only">Editor horario v5.1</h2>
    <div class="header">
      <div class="title-block">
        <div class="title">// SISTEMA.HORARIO</div>
        <div class="subtitle" id="subtitleTxt">tienda · N personas · v5.1.0</div>
      </div>
      <div class="nav">
        <button id="bLogin" class="nav-btn" style="border-color:transparent">Admin</button>
        <input type="date" id="datePicker" class="nav-btn" style="padding:2px 4px; height: 21px; font-family: inherit;"/>
        <button class="nav-btn" id="bPrev">← ant</button>
        <span class="week-tag" id="wLabel">...</span>
        <button class="nav-btn" id="bNext">sig →</button>
      </div>
    </div>
    <div class="dashboard">
      <div>
        <div class="tabs">
          <button class="tab active" data-view="person">Por persona</button>
          <button class="tab" data-view="day">Por día</button>
          <button class="tab" data-view="cover">Cobertura</button>
          <button class="tab" data-view="hours">Horas</button>
        </div>
        <div class="grid-wrap" id="tContainer"></div>
        <div class="legend-block" id="legendBlock"></div>
      </div>
      <div class="metrics-side" id="metricsSide"></div>
    </div>
    <div class="actions">
      <button class="action-btn" id="bEditEmps">👥 Empleados</button>
      <button class="action-btn" id="bEditShifts">✎ Turnos base</button>
      <button class="action-btn" id="bReset">↻ Restablecer</button>
      <button class="action-btn primary" id="bLock">✓ Confirmar</button>
    </div>
    <div class="log-panel" id="logPanel">
      <!-- initial empty, renderLog fills this -->
    </div>
      <div class="modal-bg" id="modalBg">
        <div class="modal" id="modalBox">
          <div class="modal-title" id="modalTitle">Seleccionar turno</div>
          <div id="modalBody"></div>
          <button class="modal-close" id="modalClose">Cerrar</button>
        </div>
      </div>

      <div class="modal-bg" id="loginBg" style="z-index: 1000;">
        <div class="modal" style="width: 300px;">
          <div class="modal-title">Iniciar Sesión Admin</div>
          <div class="edit-grid" style="margin-top: 1rem;">
            <label>Correo</label>
            <input type="email" id="loginEmail" class="editor-input" placeholder="admin@email.com"/>
            <label>Contraseña</label>
            <input type="password" id="loginPwd" class="editor-input"/>
          </div>
          <button class="action-btn primary" id="bLoginSubmit" style="width:100%; margin-top: 1rem; justify-content:center;">Entrar con Email</button>
          
          <div style="text-align:center; margin: 15px 0; color: var(--text-tertiary); font-size: 11px;">O TAMBIÉN</div>
          
          <button class="action-btn" id="bLoginGoogle" style="width:100%; display:flex; align-items:center; justify-content:center; gap: 8px;">
            <svg style="width:14px;height:14px" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Entrar con Google
          </button>
          
          <button class="modal-close" onclick="document.getElementById('loginBg').style.display='none'">Cerrar</button>
        </div>
      </div>
    </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
